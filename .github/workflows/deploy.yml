name: Deploy Laravel App

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Build and Deploy Containers
        env:
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
          DOCKER_BUILD_RECORD_PROVENANCE: "false"
          DOCKER_BUILD_RECORD_SBOM: "false"
        run: |
          docker compose --env-file .env build --provenance=false
          docker volume rm -f portfolio_build-assets || true
          docker compose --env-file .env up -d --force-recreate --renew-anon-volumes
          sleep 10

          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan view:clear
          docker compose exec -T app php artisan config:clear
          docker compose exec -T app php artisan cache:clear
          docker compose exec -T app php artisan optimize
