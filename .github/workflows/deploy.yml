name: Deploy Laravel App

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5.3'
          extensions: mbstring, xml, bcmath, curl

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install Node and Build Assets
        run: |
          npm install
          npm run build

      - name: Build and Deploy Containers
        env:
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
          DOCKER_BUILD_RECORD_PROVENANCE: "false"
          DOCKER_BUILD_RECORD_SBOM: "false"
        run: |
          docker compose --env-file .env build --provenance=false
          docker compose --env-file .env up -d
          sleep 10
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan optimize
