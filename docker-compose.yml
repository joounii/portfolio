services:
    app:
        build: .
        restart: unless-stopped
        env_file: .env
        networks:
            - app-network
        volumes:
            - ./:/var/www
            - /var/www/vendor
            - /var/www/public/build
            - /var/www/node_modules
            - ./public:/var/www/public

    webserver:
        image: nginx:alpine
        restart: unless-stopped
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./public:/var/www/public:ro
            - /var/www/public/build
        networks:
            - app-network

    db:
        image: mysql:8.0
        restart: unless-stopped
        env_file: .env
        environment:
            - MYSQL_DATABASE=${DB_DATABASE}
            - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - app-network

    tunnel:
        image: cloudflare/cloudflared:latest
        restart: unless-stopped
        command: tunnel run
        environment:
            - TUNNEL_TOKEN=${TUNNEL_TOKEN}
        depends_on:
            - webserver
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    dbdata:
