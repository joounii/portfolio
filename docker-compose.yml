services:
    app:
        build: .
        restart: unless-stopped
        env_file: .env
        networks:
        - app-network

    webserver:
        image: nginx:alpine
        restart: unless-stopped
        volumes:
        - ./:/var/www
        - ./nginx.conf:/etc/nginx/conf.d/default.conf
        networks:
        - app-network

    db:
        image: mysql:8.0
        restart: unless-stopped
        environment:
        MYSQL_DATABASE: ${DB_DATABASE}
        MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        volumes:
        - dbdata:/var/lib/mysql
        networks:
        - app-network

    tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
        - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
        - webserver

networks:
    app-network:
        driver: bridge

volumes:
    dbdata:
